<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Code Review Assistant</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>

<body>

    <div id="particles-js"></div>

    <div class="container">

        <h1>🤖 LLM Code Review Assistant</h1>

        <textarea id="codeInput" placeholder="Paste your code here..."></textarea>

        <div class="buttons">

            <button id="reviewBtn">
                Review Code
            </button>

            <button id="downloadBtn">
                Download Review
            </button>

        </div>

        <div id="output">
            AI Review will appear here...
        </div>

    </div>

    <script src="script.js"></script>

    <script>
        particlesJS("particles-js", {
            particles: {
                number: {
                    value: 120,
                    density: {
                        enable: true,
                        value_area: 1000
                    }
                },

                color: {
                    value: "#60a5fa"
                },

                shape: {
                    type: "circle"
                },

                opacity: {
                    value: 0.4,
                    random: true
                },

                size: {
                    value: 3,
                    random: true
                },

                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#3b82f6",
                    opacity: 0.15,
                    width: 1
                },

                move: {
                    enable: true,
                    speed: 1.5,
                    direction: "none",
                    random: true,
                    straight: false,
                    out_mode: "out"
                }
            },

            interactivity: {
                detect_on: "canvas",

                events: {
                    onhover: {
                        enable: true,
                        mode: "grab"
                    },

                    onclick: {
                        enable: true,
                        mode: "push"
                    }
                },

                modes: {
                    grab: {
                        distance: 180,
                        line_linked: {
                            opacity: 0.4
                        }
                    },

                    push: {
                        particles_nb: 4
                    }
                }
            },

            retina_detect: true
        });
    </script>

</body>

</html>
